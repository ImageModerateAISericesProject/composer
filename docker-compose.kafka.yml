services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - IMAIS
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - IMAIS
    entrypoint: ["/bin/sh", "-c"]
    command: |
     "
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_STATUS_NAME} --partitions ${KAFKA_TOPIC_STATUS_PARTITIONS} --replication-factor ${KAFKA_TOPIC_STATUS_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_PENDING_NAME} --partitions ${KAFKA_TOPIC_PENDING_PARTITIONS} --replication-factor ${KAFKA_TOPIC_PENDING_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_APPROVED_NAME} --partitions ${KAFKA_TOPIC_APPROVED_PARTITIONS} --replication-factor ${KAFKA_TOPIC_APPROVED_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_REJECTED_NAME} --partitions ${KAFKA_TOPIC_REJECTED_PARTITIONS} --replication-factor ${KAFKA_TOPIC_REJECTED_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_NSFW_NAME} --partitions ${KAFKA_TOPIC_NSFW_PARTITIONS} --replication-factor ${KAFKA_TOPIC_NSFW_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_WEAPON_NAME} --partitions ${KAFKA_TOPIC_WEAPON_PARTITIONS} --replication-factor ${KAFKA_TOPIC_WEAPON_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_VIOLENCE_NAME} --partitions ${KAFKA_TOPIC_VIOLENCE_PARTITIONS} --replication-factor ${KAFKA_TOPIC_VIOLENCE_REPLICATION_FACTOR};
      kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVER} --create --if-not-exists --topic ${KAFKA_TOPIC_ML_ANSWER_NAME} --partitions ${KAFKA_TOPIC_ML_ANSWER_PARTITIONS} --replication-factor ${KAFKA_TOPIC_ML_ANSWER_REPLICATION_FACTOR};
      echo 'Topics created.
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVER}
    depends_on:
      - kafka
    networks:
      - IMAIS

volumes:
  kafka_data: