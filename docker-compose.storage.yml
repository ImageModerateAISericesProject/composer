services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:9000"   # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"   # web-консоль
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address "${MINIO_CONSOLE_ADDRESS}"
    networks:
      - IMAIS
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # создаёт бакет один раз при старте
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - IMAIS
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local ${MINIO_SERVER_URL} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
      mc mb --ignore-existing local/${MINIO_BUCKET_PENDING}
      mc mb --ignore-existing local/${MINIO_BUCKET_APPROVED}
      mc mb --ignore-existing local/${MINIO_BUCKET_REJECTED}
      echo 'Buckets created.'
      "

volumes:
  minio_data: